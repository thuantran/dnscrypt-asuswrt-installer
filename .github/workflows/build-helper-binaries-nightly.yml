          build_haveged() {
            clone_repo_at_ref "$HAVEGED_REPO" "$HAVEGED_REF" _src/haveged

            cd _src/haveged

            autoreconf -fiv

            ./configure \
              --build="$(gcc -dumpmachine)" \
              --host="$HOST" \
              --prefix=/usr \
              CC="$CC" \
              AR="$AR" \
              RANLIB="$RANLIB" \
              STRIP="$STRIP" \
              CPPFLAGS="$COMMON_CPPFLAGS" \
              CFLAGS="$COMMON_CFLAGS" \
              LDFLAGS="$COMMON_LDFLAGS"

            make -j"$(nproc)" || {
              echo "haveged parallel build failed; retrying single-threaded" >&2
              make clean
              make
            }

            if [ -f haveged/.libs/haveged ]; then
              binary_path="haveged/.libs/haveged"
            elif [ -f haveged/haveged ]; then
              binary_path="haveged/haveged"
            elif [ -f src/.libs/haveged ]; then
              binary_path="src/.libs/haveged"
            elif [ -f src/haveged ]; then
              binary_path="src/haveged"
            else
              echo "haveged binary not found. Searching..." >&2
              find . -name "haveged" -type f -executable 2>/dev/null || true
              exit 1
            fi

            cp "$binary_path" "$GITHUB_WORKSPACE/$OUT_DIR/haveged"

            cd "$GITHUB_WORKSPACE"
          }

          build_rngd() {
            clone_repo_at_ref "$RNG_TOOLS_REPO" "$RNG_TOOLS_REF" _src/rng-tools

            cd _src/rng-tools

            ./autogen.sh

            echo "Checking rng-tools dependency pkg-config modules:"
            for pc in \
              libcap \
              openssl \
              libcrypto \
              libcurl \
              jansson \
              libxml-2.0 \
              librtlsdr \
              rtlsdr \
              libusb-1.0 \
              libudev \
              libp11 \
              jitterentropy \
              libjitterentropy
            do
              if pkg-config --exists "$pc"; then
                echo "  found: $pc"
                pkg-config --cflags "$pc" || true
                pkg-config --libs --static "$pc" || true
              else
                echo "  missing: $pc"
              fi
            done

            RNGD_CPPFLAGS="$COMMON_CPPFLAGS"
            RNGD_LDFLAGS="$COMMON_LDFLAGS"

            RNGD_PKG_CFLAGS="$(
              pkg-config --cflags \
                libcap \
                openssl \
                libcurl \
                jansson \
                libxml-2.0 \
                librtlsdr \
                libusb-1.0 \
                libudev \
                libp11 \
                jitterentropy 2>/dev/null || true
            )"

            RNGD_PKG_LIBS="$(
              pkg-config --libs --static \
                libcap \
                openssl \
                libcurl \
                jansson \
                libxml-2.0 \
                librtlsdr \
                libusb-1.0 \
                libudev \
                libp11 \
                jitterentropy 2>/dev/null || true
            )"

            # Safety net for static transitive dependencies that some .pc files may omit.
            RNGD_EXTRA_LIBS="-ludev -lcap -lrtlsdr -lusb-1.0 -lp11 -lxml2 -lcurl -ljansson -lssl -lcrypto -ljitterentropy -lz -ldl -pthread -latomic"

            echo "RNGD_PKG_CFLAGS=$RNGD_PKG_CFLAGS"
            echo "RNGD_PKG_LIBS=$RNGD_PKG_LIBS"
            echo "RNGD_EXTRA_LIBS=$RNGD_EXTRA_LIBS"

            # Let rng-tools detect the target-built libraries from $DEPS_DIR.
            # No --without-* feature disables here.
            ./configure \
              --build="$(gcc -dumpmachine)" \
              --host="$HOST" \
              --prefix=/usr \
              --disable-silent-rules \
              CC="$CC" \
              AR="$AR" \
              RANLIB="$RANLIB" \
              STRIP="$STRIP" \
              PKG_CONFIG=pkg-config \
              CPPFLAGS="$RNGD_CPPFLAGS $RNGD_PKG_CFLAGS" \
              CFLAGS="$COMMON_CFLAGS" \
              LDFLAGS="$RNGD_LDFLAGS" \
              LIBS="$RNGD_PKG_LIBS $RNGD_EXTRA_LIBS"

            make V=1 -j"$(nproc)" || {
              echo "rngd parallel build failed; retrying single-threaded" >&2
              make clean
              make V=1
            }

            if [ -f rngd ]; then
              cp -v rngd "$GITHUB_WORKSPACE/$OUT_DIR/rngd"
            else
              echo "rngd binary not found. Searching..." >&2
              find . -name "rngd" -type f -executable 2>/dev/null || true
              exit 1
            fi

            cd "$GITHUB_WORKSPACE"
          }

          build_stty() {
            : "${COREUTILS_VERSION:?COREUTILS_VERSION is not set}"
            : "${COREUTILS_SHA256_BASE64:?COREUTILS_SHA256_BASE64 is not set}"

            url="https://ftp.gnu.org/gnu/coreutils/coreutils-${COREUTILS_VERSION}.tar.xz"
            out="$GITHUB_WORKSPACE/_build/coreutils-${COREUTILS_VERSION}.tar.xz"
            srcdir="$GITHUB_WORKSPACE/_src/coreutils-${COREUTILS_VERSION}"
            logdir="$GITHUB_WORKSPACE/_build/coreutils-${COREUTILS_VERSION}-logs"
            cache_file="$GITHUB_WORKSPACE/_build/coreutils-${COREUTILS_VERSION}.config.cache"
            compat_header="$GITHUB_WORKSPACE/_build/coreutils-cross-compat.h"

            mkdir -p "$GITHUB_WORKSPACE/_build" "$GITHUB_WORKSPACE/_src" "$logdir"

            rm -f "$out"
            rm -rf "$srcdir"

            echo "Downloading coreutils: $url"
            curl -fL --retry 5 --retry-delay 3 "$url" -o "$out"

            echo "Verifying coreutils base64 SHA256:"
            python3 -c 'import base64, hashlib, sys; p=sys.argv[1]; exp=sys.argv[2]; data=open(p,"rb").read(); got=base64.b64encode(hashlib.sha256(data).digest()).decode(); print(f"{p}: {got}"); sys.exit(0 if got == exp else 1)' "$out" "$COREUTILS_SHA256_BASE64"

