          build_nonroot() {
            mkdir -p "$GITHUB_WORKSPACE/_build" "$GITHUB_WORKSPACE/$OUT_DIR"

            src="$GITHUB_WORKSPACE/_build/nonroot.c"
            out="$GITHUB_WORKSPACE/$OUT_DIR/nonroot"

            printf '%s\n' \
              '#include <errno.h>' \
              '#include <grp.h>' \
              '#include <pwd.h>' \
              '#include <stdio.h>' \
              '#include <stdlib.h>' \
              '#include <string.h>' \
              '#include <sys/types.h>' \
              '#include <unistd.h>' \
              '' \
              'int main(int argc, char **argv) {' \
              '  if (argc < 3) {' \
              '    fprintf(stderr, "Usage: %s <username> <program> [args...]\\n", argv[0]);' \
              '    return 64;' \
              '  }' \
              '' \
              '  struct passwd *pw = getpwnam(argv[1]);' \
              '  if (!pw) {' \
              '    fprintf(stderr, "nonroot: user '\''%s'\'' not found\\n", argv[1]);' \
              '    return 65;' \
              '  }' \
              '' \
              '  if (initgroups(argv[1], pw->pw_gid) != 0) {' \
              '    fprintf(stderr, "nonroot: failed to initialize groups for '\''%s'\'': %s\\n", argv[1], strerror(errno));' \
              '    return 66;' \
              '  }' \
              '' \
              '  if (setgid(pw->pw_gid) != 0 || setuid(pw->pw_uid) != 0) {' \
              '    fprintf(stderr, "nonroot: failed to switch to '\''%s'\'': %s\\n", argv[1], strerror(errno));' \
              '    return 66;' \
              '  }' \
              '' \
              '  execvp(argv[2], &argv[2]);' \
              '' \
              '  fprintf(stderr, "nonroot: failed to exec '\''%s'\'': %s\\n", argv[2], strerror(errno));' \
              '  return 67;' \
              '}' > "$src"

            echo "Building nonroot for $HOST"

            "$CC" \
              ${COMMON_CPPFLAGS:-} \
              ${COMMON_CFLAGS:-} \
              "$src" \
              ${COMMON_LDFLAGS:-} \
              -o "$out"

            "$STRIP" "$out" 2>/dev/null || true

            chmod 0755 "$out"

            file "$out" || true
          }
          
          build_jitterentropy_rngd() {
            clone_repo_at_ref "$JITTERENTROPY_REPO" "$JITTERENTROPY_REF" _src/jitterentropy-rngd

            cd _src/jitterentropy-rngd

            JENT_RNGD_CPPFLAGS="$COMMON_CPPFLAGS $(pkg-config --cflags jitterentropy 2>/dev/null || true)"
            JENT_RNGD_LDFLAGS="$COMMON_LDFLAGS $(pkg-config --libs-only-L jitterentropy 2>/dev/null || true)"
            JENT_RNGD_LIBS="$(pkg-config --libs jitterentropy 2>/dev/null || printf '%s\n' '-ljitterentropy') -pthread"

            echo "Building jitterentropy-rngd for $HOST"
            echo "JENT_RNGD_CPPFLAGS=$JENT_RNGD_CPPFLAGS"
            echo "JENT_RNGD_LDFLAGS=$JENT_RNGD_LDFLAGS"
            echo "JENT_RNGD_LIBS=$JENT_RNGD_LIBS"

            make V=1 -j"$(nproc)" \
              CC="$CC" \
              AR="$AR" \
              RANLIB="$RANLIB" \
              CPPFLAGS="$JENT_RNGD_CPPFLAGS" \
              CFLAGS="$COMMON_CFLAGS" \
              LDFLAGS="$JENT_RNGD_LDFLAGS" \
              LDLIBS="$JENT_RNGD_LIBS" \
              LIBS="$JENT_RNGD_LIBS" \
              EXTRA_CPPFLAGS="$JENT_RNGD_CPPFLAGS" \
              EXTRA_CFLAGS="$COMMON_CFLAGS" \
              EXTRA_LDFLAGS="$JENT_RNGD_LDFLAGS $JENT_RNGD_LIBS" || {
                echo "jitterentropy-rngd parallel build failed; retrying single-threaded" >&2
                make clean || true
                make V=1 \
                  CC="$CC" \
                  AR="$AR" \
                  RANLIB="$RANLIB" \
                  CPPFLAGS="$JENT_RNGD_CPPFLAGS" \
                  CFLAGS="$COMMON_CFLAGS" \
                  LDFLAGS="$JENT_RNGD_LDFLAGS" \
                  LDLIBS="$JENT_RNGD_LIBS" \
                  LIBS="$JENT_RNGD_LIBS" \
                  EXTRA_CPPFLAGS="$JENT_RNGD_CPPFLAGS" \
                  EXTRA_CFLAGS="$COMMON_CFLAGS" \
                  EXTRA_LDFLAGS="$JENT_RNGD_LDFLAGS $JENT_RNGD_LIBS"
              }

            if [ -f jitterentropy-rngd ]; then
              cp -v jitterentropy-rngd "$GITHUB_WORKSPACE/$OUT_DIR/jitterentropy-rngd"
            else
              echo "jitterentropy-rngd binary not found. Searching..." >&2
              find . -name "jitterentropy-rngd" -type f -executable 2>/dev/null || true
              exit 1
            fi

            cd "$GITHUB_WORKSPACE"
          }

          build_all_rng_dependencies

          build_haveged
          build_rngd
          build_stty
          build_nonroot
          build_jitterentropy_rngd

          chmod 755 \
            "$OUT_DIR/haveged" \
            "$OUT_DIR/rngd" \
            "$OUT_DIR/stty" \
            "$OUT_DIR/nonroot" \
            "$OUT_DIR/jitterentropy-rngd"

          "$STRIP" \
            "$OUT_DIR/haveged" \
            "$OUT_DIR/rngd" \
            "$OUT_DIR/stty" \
            "$OUT_DIR/nonroot" \
            "$OUT_DIR/jitterentropy-rngd" || true

          file \
            "$OUT_DIR/haveged" \
            "$OUT_DIR/rngd" \
            "$OUT_DIR/stty" \
            "$OUT_DIR/nonroot" \
            "$OUT_DIR/jitterentropy-rngd"

          md5sum "$OUT_DIR/haveged" | awk '{print $1}' > "$OUT_DIR/haveged.md5sum"
          md5sum "$OUT_DIR/rngd" | awk '{print $1}' > "$OUT_DIR/rngd.md5sum"
          md5sum "$OUT_DIR/stty" | awk '{print $1}' > "$OUT_DIR/stty.md5sum"
          md5sum "$OUT_DIR/nonroot" | awk '{print $1}' > "$OUT_DIR/nonroot.md5sum"
          md5sum "$OUT_DIR/jitterentropy-rngd" | awk '{print $1}' > "$OUT_DIR/jitterentropy-rngd.md5sum"

      - name: Upload helper binaries
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.6.0
        with:
          name: helper-binaries-nightly-${{ matrix.target }}
          path: |
            dist/${{ matrix.repo_dir }}/haveged
            dist/${{ matrix.repo_dir }}/haveged.md5sum
            dist/${{ matrix.repo_dir }}/rngd
            dist/${{ matrix.repo_dir }}/rngd.md5sum
            dist/${{ matrix.repo_dir }}/stty
            dist/${{ matrix.repo_dir }}/stty.md5sum
            dist/${{ matrix.repo_dir }}/nonroot
            dist/${{ matrix.repo_dir }}/nonroot.md5sum
            dist/${{ matrix.repo_dir }}/jitterentropy-rngd
            dist/${{ matrix.repo_dir }}/jitterentropy-rngd.md5sum

  publish:
    name: Publish helper-binaries-nightly
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          set -eu

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.target_branch }}" ]; then
            checkout_ref="${{ inputs.target_branch }}"
          else
            checkout_ref="${{ github.sha }}"
          fi

          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout installer repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.checkout_ref }}

      - name: Download helper binary artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: helper-binaries-nightly-*
          path: _helper-artifacts

      - name: Stage nightly helper binaries
        run: |
          set -eu

          find _helper-artifacts/helper-binaries-nightly-linux-armv7 -type f -exec cp -f {} armv7/ \;
          find _helper-artifacts/helper-binaries-nightly-linux-armv8 -type f -exec cp -f {} armv8/ \;

          chmod 755 \
            armv7/haveged \
            armv7/rngd \
            armv7/stty \
            armv7/nonroot \
            armv7/jitterentropy-rngd \
            armv8/haveged \
            armv8/rngd \
            armv8/stty \
            armv8/nonroot \
            armv8/jitterentropy-rngd

      - name: Commit nightly helper binaries
        run: |
          set -eu

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            armv7/haveged armv7/haveged.md5sum \
            armv7/rngd armv7/rngd.md5sum \
            armv7/stty armv7/stty.md5sum \
            armv7/nonroot armv7/nonroot.md5sum \
            armv7/jitterentropy-rngd armv7/jitterentropy-rngd.md5sum \
            armv8/haveged armv8/haveged.md5sum \
            armv8/rngd armv8/rngd.md5sum \
            armv8/stty armv8/stty.md5sum \
            armv8/nonroot armv8/nonroot.md5sum \
            armv8/jitterentropy-rngd armv8/jitterentropy-rngd.md5sum

          if git diff --cached --quiet; then
            echo "No helper-binaries-nightly changes to commit."
            exit 0
          fi

          git commit -m "chore: update helper binaries nightly builds"
          git push
