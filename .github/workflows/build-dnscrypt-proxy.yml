name: Build dnscrypt-proxy-nightly
run-name: dnscrypt-proxy-nightly -> ${{ inputs.target_branch || github.ref_name }}

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Installer repository branch to update; leave blank to use the selected branch'
        required: false
        default: ''

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: dnscrypt-proxy-nightly-${{ inputs.target_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-armv7
            goarch: arm
            goarm: '7'
            archive_arch: linux_arm
            package_dir: linux-arm
            repo_dir: armv7
          - target: linux-armv8
            goarch: arm64
            goarm: ''
            archive_arch: linux_arm64
            package_dir: linux-arm64
            repo_dir: armv8

    steps:
      - name: Check out installer repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Check out dnscrypt-proxy source
        uses: actions/checkout@v4
        with:
          repository: DNSCrypt/dnscrypt-proxy
          ref: master
          path: dnscrypt-proxy-src
          fetch-depth: 1

      - name: Resolve source metadata
        id: dnscrypt
        run: |
          set -euo pipefail

          short_sha="$(git -C dnscrypt-proxy-src rev-parse --short=12 HEAD)"
          full_sha="$(git -C dnscrypt-proxy-src rev-parse HEAD)"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "full_sha=${full_sha}" >> "${GITHUB_OUTPUT}"
          {
            printf '%s\n' '## dnscrypt-proxy-nightly build source'
            printf '%s\n' ''
            printf '%s\n' '- Repository: `DNSCrypt/dnscrypt-proxy`'
            printf '%s\n' '- Ref: `master`'
            printf '%s\n' "- Commit: \`${full_sha}\`"
            printf '%s\n' '- Package version: `nightly`'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: dnscrypt-proxy-src/go.mod
          cache-dependency-path: dnscrypt-proxy-src/go.sum

      - name: Install minisign
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Build dnscrypt-proxy
        run: |
          set -euo pipefail

          package_dir="${GITHUB_WORKSPACE}/dist/${{ matrix.package_dir }}"
          mkdir -p "${package_dir}"

          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            export GOARM="${{ matrix.goarm }}"
          fi

          cd dnscrypt-proxy-src/dnscrypt-proxy
          go build -trimpath -ldflags="-s -w" -mod vendor -o "${package_dir}/dnscrypt-proxy"
          chmod 755 "${package_dir}/dnscrypt-proxy"

      - name: Package and sign nightly archive
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PRIVATE_KEY_B64: ${{ secrets.MINISIGN_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          package_dir="dist/${{ matrix.package_dir }}"
          archive="dnscrypt-proxy-${{ matrix.archive_arch }}-nightly.tar.gz"
          archive_path="dist/${archive}"
          key_file="${RUNNER_TEMP}/minisign.key"

          if [ -n "${MINISIGN_PRIVATE_KEY_B64}" ]; then
            printf '%s' "${MINISIGN_PRIVATE_KEY_B64}" | base64 -d > "${key_file}"
          elif [ -n "${MINISIGN_PRIVATE_KEY}" ]; then
            printf '%s\n' "${MINISIGN_PRIVATE_KEY}" > "${key_file}"
          else
            cat >&2 <<'EOF'
          MINISIGN_PRIVATE_KEY or MINISIGN_PRIVATE_KEY_B64 is required to create nightly .minisig files.

          Create an unencrypted minisign key and add one of these repository Actions secrets:
          - MINISIGN_PRIVATE_KEY: full text contents of minisign.key
          - MINISIGN_PRIVATE_KEY_B64: base64-encoded contents of minisign.key

          Example:
            minisign -G -W -s minisign.key -p minisign.pub
            base64 -w0 minisign.key
          EOF
            exit 1
          fi
          chmod 600 "${key_file}"
          minisign -R -s "${key_file}" -p dist/dnscrypt-proxy-nightly.pub -f

          cp dnscrypt-proxy-src/LICENSE "${package_dir}/LICENSE"
          cp dnscrypt-proxy-src/dnscrypt-proxy/example-*.txt "${package_dir}/"
          cp dnscrypt-proxy-src/dnscrypt-proxy/example-dnscrypt-proxy.toml "${package_dir}/"
          cp dnscrypt-proxy-src/dnscrypt-proxy/localhost.pem "${package_dir}/"

          tar -czf "${archive_path}" -C dist "${{ matrix.package_dir }}"
          minisign -S -s "${key_file}" -m "${archive_path}" -x "${archive_path}.minisig" \
            -c "dnscrypt-proxy-nightly ${{ matrix.target }} from DNSCrypt/dnscrypt-proxy master" \
            -t "dnscrypt-proxy-nightly ${{ matrix.target }} ${{ steps.dnscrypt.outputs.full_sha }}"
          sha256sum "${archive_path}" > "${archive_path}.sha256"
          sha256sum "${archive_path}.minisig" > "${archive_path}.minisig.sha256"
          tar -tzf "${archive_path}"

      - name: Stage nightly package in installer repository
        run: |
          set -euo pipefail

          archive="dnscrypt-proxy-${{ matrix.archive_arch }}-nightly.tar.gz"
          repo_dir="${{ matrix.repo_dir }}"

          mkdir -p "${repo_dir}"
          mkdir -p gen
          cp dist/dnscrypt-proxy-nightly.pub gen/dnscrypt-proxy-nightly.pub
          cp "dist/${archive}" "${repo_dir}/${archive}"
          cp "dist/${archive}.minisig" "${repo_dir}/${archive}.minisig"
          md5sum gen/dnscrypt-proxy-nightly.pub | awk '{print $1}' > gen/dnscrypt-proxy-nightly.pub.md5sum
          md5sum "${repo_dir}/${archive}" | awk '{print $1}' > "${repo_dir}/${archive}.md5sum"
          md5sum "${repo_dir}/${archive}.minisig" | awk '{print $1}' > "${repo_dir}/${archive}.minisig.md5sum"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnscrypt-proxy-nightly-${{ matrix.target }}
          path: |
            ${{ matrix.repo_dir }}/dnscrypt-proxy-${{ matrix.archive_arch }}-nightly.tar.gz
            ${{ matrix.repo_dir }}/dnscrypt-proxy-${{ matrix.archive_arch }}-nightly.tar.gz.minisig
            ${{ matrix.repo_dir }}/dnscrypt-proxy-${{ matrix.archive_arch }}-nightly.tar.gz.md5sum
            ${{ matrix.repo_dir }}/dnscrypt-proxy-${{ matrix.archive_arch }}-nightly.tar.gz.minisig.md5sum
            gen/dnscrypt-proxy-nightly.pub
            gen/dnscrypt-proxy-nightly.pub.md5sum
          if-no-files-found: error

  publish:
    name: Publish dnscrypt-proxy-nightly
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out installer repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Download nightly package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dnscrypt-proxy-nightly-*
          path: _nightly-artifacts

      - name: Restore architecture directories
        run: |
          set -euo pipefail

          mkdir -p armv7 armv8
          mkdir -p gen
          find _nightly-artifacts/dnscrypt-proxy-nightly-linux-armv7 -type f -name 'dnscrypt-proxy-linux_arm-nightly.tar.gz*' -exec cp -f {} armv7/ \;
          find _nightly-artifacts/dnscrypt-proxy-nightly-linux-armv8 -type f -name 'dnscrypt-proxy-linux_arm64-nightly.tar.gz*' -exec cp -f {} armv8/ \;
          find _nightly-artifacts -type f -name 'dnscrypt-proxy-nightly.pub*' -exec cp -f {} gen/ \;
          test -f armv7/dnscrypt-proxy-linux_arm-nightly.tar.gz
          test -f armv7/dnscrypt-proxy-linux_arm-nightly.tar.gz.minisig
          test -f armv8/dnscrypt-proxy-linux_arm64-nightly.tar.gz
          test -f armv8/dnscrypt-proxy-linux_arm64-nightly.tar.gz.minisig
          test -f gen/dnscrypt-proxy-nightly.pub

      - name: Commit nightly packages
        env:
          TARGET_BRANCH: ${{ inputs.target_branch || github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            armv7/dnscrypt-proxy-linux_arm-nightly.tar.gz \
            armv7/dnscrypt-proxy-linux_arm-nightly.tar.gz.minisig \
            armv7/dnscrypt-proxy-linux_arm-nightly.tar.gz.md5sum \
            armv7/dnscrypt-proxy-linux_arm-nightly.tar.gz.minisig.md5sum \
            armv8/dnscrypt-proxy-linux_arm64-nightly.tar.gz \
            armv8/dnscrypt-proxy-linux_arm64-nightly.tar.gz.minisig \
            armv8/dnscrypt-proxy-linux_arm64-nightly.tar.gz.md5sum \
            armv8/dnscrypt-proxy-linux_arm64-nightly.tar.gz.minisig.md5sum \
            gen/dnscrypt-proxy-nightly.pub \
            gen/dnscrypt-proxy-nightly.pub.md5sum

          if git diff --cached --quiet; then
            echo "No dnscrypt-proxy-nightly package changes to commit."
            exit 0
          fi

          git commit -m "chore: update dnscrypt-proxy nightly builds"
          git push origin HEAD:"${TARGET_BRANCH}"
